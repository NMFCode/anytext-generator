name: Publish

permissions:
  id-token: write

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Anytext Publish
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        registry-url: 'https://registry.npmjs.org'
    - name: Build
      shell: bash
      run: |
        npm ci
        npm run build:clean
        npm run build
        npm run test
    - name: Publish NPM Packages
      shell: bash
      run: |
        npm run publish:latest --provenance --workspace=generator-anytext
